version: "3.9"

# Overrides applied on top of docker-compose.yml for PRODUCTION environment
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:

  backend:
    environment:
      APP_ENV: production
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  frontend:
    environment:
      NEXT_PUBLIC_API_URL: https://api.yourdomain.com   # replace with real domain
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro    # mount your SSL certs here
    restart: always
